name: flutter_link_previewer
description: >
  Customizable link and URL preview extracted from the
  provided text with the ability to render from the cache. Ideal
  for chat applications.
version: 4.2.0
homepage: https://flyer.chat
repository: https://github.com/ekyeremeh7/flutter_chat_ui

environment:
  sdk: ">=3.4.1 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  html: ^0.15.4
  http: ^1.2.0
  punycode: ^1.0.0
  url_launcher: ">=6.2.0 <8.0.0"

dev_dependencies:
  flutter_lints: ">=4.0.0 <6.0.0"
  flutter_test:
    sdk: flutter
